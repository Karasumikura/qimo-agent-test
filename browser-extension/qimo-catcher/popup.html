<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Qimo Catcher</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>Qimo Catcher</h1>
      <p id="status">Loading current tab...</p>
    </header>

    <label>
      <span>Course</span>
      <input id="courseInput" value="Unnamed Course" />
    </label>

    <label>
      <span>Title</span>
      <input id="titleInput" />
    </label>

    <div class="actions">
      <button id="refreshBtn" type="button">Refresh</button>
      <button id="clearBtn" type="button">Clear</button>
    </div>

    <div id="candidateList" class="candidate-list"></div>

    <div class="actions">
      <button id="uploadFirstBtn" type="button">Upload first in browser</button>
      <button id="importAllBtn" type="button">Import URLs</button>
      <button id="copyBtn" type="button">Copy</button>
    </div>

    <p class="hint">Play the course video for a few seconds, then open this popup. Use browser upload first; it uses your logged-in browser session.</p>

    <script src="popup.js"></script>
  </body>
</html>
