<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Qimo Catcher</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <div>
        <h1>Qimo Catcher</h1>
        <p id="status">Checking automatic capture...</p>
      </div>
      <label class="switch" title="Pause or resume automatic import">
        <input id="autoToggle" type="checkbox" checked />
        <span>Auto</span>
      </label>
    </header>

    <section class="panel">
      <div class="metric">
        <span>Service</span>
        <strong id="serviceMetric">-</strong>
      </div>
      <div class="metric">
        <span>Captured</span>
        <strong id="capturedMetric">0</strong>
      </div>
      <div class="metric">
        <span>Uploaded</span>
        <strong id="uploadedMetric">0</strong>
      </div>
      <div class="metric">
        <span>Submitted</span>
        <strong id="submittedMetric">0</strong>
      </div>
    </section>

    <section class="page">
      <span>Current page</span>
      <strong id="pageTitle">No active page</strong>
      <p id="pageUrl"></p>
    </section>

    <div class="actions">
      <button id="openDashboardBtn" type="button">Open dashboard</button>
      <button id="importNowBtn" type="button">Import now</button>
      <button id="clearBtn" type="button">Clear history</button>
    </div>

    <p class="hint">
      Log in to JLU Learning normally, open a course video, and play it for a few seconds.
      The extension sends authorized media requests and page transcripts to 127.0.0.1 only.
    </p>

    <script src="popup.js"></script>
  </body>
</html>
